info:
  name: Get category
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/v1/categories/{{categoryId}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: "{{baseUrl}}/api/v1/categories/{{categoryId}}"
      method: GET
    response:
      statusText: "200"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "data": {
              "id": 1,
              "name": "BOULDER Men",
              "discipline": "boulder",
              "gender": "male",
              "external_dcat_id": 3,
              "event_id": 1,
              "rounds": [
                {
                  "id": 1,
                  "name": "Qualification",
                  "round_type": "qualification",
                  "status": "completed",
                  "external_round_id": 9381,
                  "category_id": 1
                },
                {
                  "id": 2,
                  "name": "Semi-final",
                  "round_type": "semi_final",
                  "status": "completed",
                  "external_round_id": 9953,
                  "category_id": 1
                },
                {
                  "id": 3,
                  "name": "Final",
                  "round_type": "final",
                  "status": "completed",
                  "external_round_id": 9955,
                  "category_id": 1
                }
              ]
            }
          }
  - name: 404 Not Found
    request:
      url: "{{baseUrl}}/api/v1/categories/{{categoryId}}"
      method: GET
    response:
      statusText: "404"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Not found"
          }
