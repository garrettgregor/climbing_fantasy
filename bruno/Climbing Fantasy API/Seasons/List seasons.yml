info:
  name: List seasons
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/v1/seasons?page=1&per_page=25"
  params:
    - name: page
      value: "1"
      type: query
    - name: per_page
      value: "25"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: "{{baseUrl}}/api/v1/seasons?page=1&per_page=25"
      method: GET
      params:
        - name: page
          value: "1"
          type: query
        - name: per_page
          value: "25"
          type: query
    response:
      statusText: "200"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "data": [
              {
                "id": 1,
                "name": "IFSC World Cup 2025",
                "year": 2025,
                "external_id": 37
              },
              {
                "id": 2,
                "name": "World Climbing Series 2026",
                "year": 2026,
                "external_id": 38
              }
            ],
            "meta": {
              "page": 1,
              "per_page": 25,
              "total": 2
            }
          }
