info:
  name: Get event
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/api/v1/events/{{eventId}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: "{{baseUrl}}/api/v1/events/{{eventId}}"
      method: GET
    response:
      statusText: "200"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "data": {
              "id": 1,
              "name": "IFSC World Cup Keqiao 2025",
              "location": "Keqiao, CHN",
              "starts_on": "2025-04-18",
              "ends_on": "2025-04-20",
              "status": "completed",
              "season_id": 1,
              "external_id": 1405,
              "results_synced_at": null,
              "season": {
                "id": 1,
                "name": "IFSC World Cup 2025",
                "year": 2025,
                "external_id": 37
              },
              "categories": [
                {
                  "id": 1,
                  "name": "BOULDER Men",
                  "discipline": "boulder",
                  "gender": "male",
                  "external_dcat_id": 3,
                  "event_id": 1
                },
                {
                  "id": 2,
                  "name": "BOULDER Women",
                  "discipline": "boulder",
                  "gender": "female",
                  "external_dcat_id": 7,
                  "event_id": 1
                }
              ]
            }
          }
  - name: 404 Not Found
    request:
      url: "{{baseUrl}}/api/v1/events/{{eventId}}"
      method: GET
    response:
      statusText: "404"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Not found"
          }
