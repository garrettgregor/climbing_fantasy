info:
  name: Get round
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/v1/rounds/{{roundId}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: "{{baseUrl}}/api/v1/rounds/{{roundId}}"
      method: GET
    response:
      statusText: "200"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "data": {
              "id": 1,
              "name": "Qualification",
              "round_type": "qualification",
              "status": "completed",
              "external_round_id": 9381,
              "category_id": 1,
              "round_results": []
            }
          }
  - name: 404 Not Found
    request:
      url: "{{baseUrl}}/api/v1/rounds/{{roundId}}"
      method: GET
    response:
      statusText: "404"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Not found"
          }
