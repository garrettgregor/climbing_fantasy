info:
  name: Get athlete
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/api/v1/athletes/{{athleteId}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: "{{baseUrl}}/api/v1/athletes/{{athleteId}}"
      method: GET
    response:
      statusText: "200"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "data": {
              "id": 40,
              "first_name": "Zach",
              "last_name": "Hammer",
              "country_code": "USA",
              "gender": "male",
              "external_athlete_id": 13592,
              "round_results": [
                {
                  "id": 41,
                  "rank": 9,
                  "score_raw": "6.87 (4.96)",
                  "group_label": null,
                  "tops": null,
                  "zones": null,
                  "top_attempts": null,
                  "zone_attempts": null,
                  "lead_height": null,
                  "lead_plus": false,
                  "speed_time": 6.872,
                  "speed_eliminated_stage": null,
                  "round_id": 14,
                  "athlete_id": 40
                }
              ]
            }
          }
  - name: 404 Not Found
    request:
      url: "{{baseUrl}}/api/v1/athletes/{{athleteId}}"
      method: GET
    response:
      statusText: "404"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Not found"
          }
