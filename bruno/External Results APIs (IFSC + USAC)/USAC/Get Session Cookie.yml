info:
  name: Get Session Cookie
  type: http
  seq: 1

http:
  method: GET
  url: "{{usacBaseUrl}}/"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const setCookie = res.getHeader('set-cookie') || '';
        const match = setCookie.match(/(_usac_resultservice_session|_verticallife_resultservice_session)=([^;]+)/);
        if (!match) {
          test('USAC session cookie found', function () { throw new Error('No USAC session cookie found'); });
        } else {
          bru.setVar('usacCookieHeader', `${match[1]}=${match[2]}`);
          test('USAC session cookie captured', function () { expect(match[1]).to.be.a('string'); });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
