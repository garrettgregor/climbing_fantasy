---
info:
  name: Get Live Rounds (/api/v1/live)
  type: http
  seq: 6
http:
  method: GET
  url: "{{ifscBaseUrl}}/api/v1/live"
  headers:
  - name: Cookie
    value: "{{ifscCookieHeader}}"
  - name: Referer
    value: "{{ifscBaseUrl}}/"
