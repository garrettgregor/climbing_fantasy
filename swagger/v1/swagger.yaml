components:
  schemas:
    Season:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        year:
          type: integer
        source:
          type: string
          enum: [ifsc, usac]
        external_id:
          type: integer
          nullable: true
      required:
        - id
        - name
        - year
        - source

    Event:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: string
        country_code:
          type: string
          nullable: true
          description: ISO 3166-1 alpha-3 country code
        starts_on:
          type: string
          format: date
        ends_on:
          type: string
          format: date
        starts_at:
          type: string
          format: date-time
          nullable: true
          description: Precise start datetime (when available from source)
        ends_at:
          type: string
          format: date-time
          nullable: true
          description: Precise end datetime (when available from source)
        timezone_name:
          type: string
          nullable: true
          description: IANA timezone name (e.g. "Asia/Shanghai")
        status:
          type: string
          enum: [upcoming, in_progress, completed]
        source:
          type: string
          enum: [ifsc, usac]
        season_id:
          type: integer
        external_id:
          type: integer
          nullable: true
        results_synced_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - location
        - starts_on
        - ends_on
        - status
        - source
        - season_id

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        discipline:
          type: string
          enum: [boulder, lead, speed]
        gender:
          type: string
          enum: [male, female]
        category_status:
          type: string
          enum: [not_started, active, finished]
          nullable: true
        external_dcat_id:
          type: integer
          nullable: true
      required:
        - id
        - name
        - discipline
        - gender

    Round:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        round_type:
          type: string
          enum: [qualification, round_of_16, quarter_final, semi_final, small_final, final]
        status:
          type: string
          enum: [pending, in_progress, completed]
        format:
          type: string
          nullable: true
        external_round_id:
          type: integer
          nullable: true
      required:
        - id
        - name
        - round_type
        - status

    RoundResult:
      type: object
      properties:
        id:
          type: integer
        rank:
          type: integer
          nullable: true
        score_raw:
          type: string
          nullable: true
        group_label:
          type: string
          nullable: true
        start_order:
          type: integer
          nullable: true
        bib:
          type: string
          nullable: true
        starting_group:
          type: string
          nullable: true
        group_rank:
          type: integer
          nullable: true
        active:
          type: boolean
          nullable: true
        under_appeal:
          type: boolean
          nullable: true
        tops:
          type: integer
          nullable: true
        zones:
          type: integer
          nullable: true
        top_attempts:
          type: integer
          nullable: true
        zone_attempts:
          type: integer
          nullable: true
        boulder_points:
          type: string
          nullable: true
        high_zones:
          type: integer
          nullable: true
        high_zone_attempts:
          type: integer
          nullable: true
        lead_height:
          type: string
          nullable: true
        lead_plus:
          type: boolean
        speed_time:
          type: string
          nullable: true
        speed_eliminated_stage:
          type: string
          nullable: true
      required:
        - id

    Athlete:
      type: object
      properties:
        id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        country_code:
          type: string
          nullable: true
        gender:
          type: string
          enum: [male, female]
          nullable: true
        source:
          type: string
          enum: [ifsc, usac]
        photo_url:
          type: string
          nullable: true
        flag_url:
          type: string
          nullable: true
        federation:
          type: string
          nullable: true
        federation_id:
          type: integer
          nullable: true
        external_athlete_id:
          type: integer
          nullable: true
      required:
        - id
        - first_name
        - last_name
        - source

    Pagination:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
      required:
        - page
        - per_page
        - total

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
