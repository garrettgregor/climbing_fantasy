openapi: 3.0.1
info:
  title: Climbing Fantasy API
  version: v1
  description: JSON API for competition climbing results from IFSC, USAC, and other federations
servers:
  - url: http://localhost:3000
    description: Development

paths:
  /api/v1/seasons:
    get:
      summary: List all seasons
      tags:
        - Seasons
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Seasons listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Season"
                  meta:
                    $ref: "#/components/schemas/Pagination"
                required:
                  - data
                  - meta
              example:
                data:
                  - id: 999184339
                    name: "World Climbing Series 2026"
                    year: 2026
                    source: "ifsc"
                    external_id: 38
                  - id: 579274347
                    name: "IFSC World Cup 2025"
                    year: 2025
                    source: "ifsc"
                    external_id: 37
                meta:
                  page: 1
                  per_page: 25
                  total: 2

  /api/v1/seasons/{id}:
    get:
      summary: Get season detail with events
      tags:
        - Seasons
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Season found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: "#/components/schemas/Season"
                      - type: object
                        properties:
                          events:
                            type: array
                            items:
                              $ref: "#/components/schemas/Event"
                required:
                  - data
              example:
                data:
                  id: 579274347
                  name: "IFSC World Cup 2025"
                  year: 2025
                  source: "ifsc"
                  external_id: 37
                  events:
                    - id: 672868979
                      name: "IFSC World Cup Keqiao 2025"
                      location: "Keqiao, CHN"
                      country_code: "CHN"
                      starts_on: "2025-04-18"
                      ends_on: "2025-04-20"
                      starts_at: "2025-04-17T16:00:00.000Z"
                      ends_at: "2025-04-20T15:59:00.000Z"
                      timezone_name: "Asia/Shanghai"
                      status: "completed"
                      source: "ifsc"
                      season_id: 579274347
                      external_id: 1405
                      results_synced_at: "2025-10-02T07:18:42.000Z"
                    - id: 1056528741
                      name: "IFSC World Cup Wujiang 2025"
                      location: "Wujiang, CHN"
                      country_code: "CHN"
                      starts_on: "2025-04-25"
                      ends_on: "2025-04-27"
                      starts_at: "2025-04-24T16:00:00.000Z"
                      ends_at: "2025-04-27T15:59:00.000Z"
                      timezone_name: "Asia/Shanghai"
                      status: "completed"
                      source: "ifsc"
                      season_id: 579274347
                      external_id: 1406
                      results_synced_at: "2025-10-05T09:30:00.000Z"
        "404":
          description: Season not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Not found"

  /api/v1/events:
    get:
      summary: List events
      tags:
        - Events
      parameters:
        - name: season_id
          in: query
          required: false
          schema:
            type: integer
        - name: discipline
          in: query
          required: false
          description: Filter events by category discipline
          schema:
            type: string
            enum: [boulder, lead, speed]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [upcoming, in_progress, completed]
        - name: year
          in: query
          required: false
          schema:
            type: integer
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Events listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                  meta:
                    $ref: "#/components/schemas/Pagination"
                required:
                  - data
                  - meta
              example:
                data:
                  - id: 895726900
                    name: "World Climbing Series Keqiao 2026"
                    location: "Keqiao, CHN"
                    country_code: "CHN"
                    starts_on: "2026-05-01"
                    ends_on: "2026-05-03"
                    starts_at: "2026-04-30T16:00:00.000Z"
                    ends_at: "2026-05-03T15:59:00.000Z"
                    timezone_name: "Asia/Shanghai"
                    status: "upcoming"
                    source: "ifsc"
                    season_id: 999184339
                    external_id: 1524
                    results_synced_at: null
                  - id: 25834392
                    name: "World Climbing Oceania Series New South Wales 2026"
                    location: "Gladesville, AUS"
                    country_code: "AUS"
                    starts_on: "2026-02-28"
                    ends_on: "2026-03-01"
                    starts_at: "2026-02-27T13:00:00.000Z"
                    ends_at: "2026-03-01T12:59:00.000Z"
                    timezone_name: "Australia/Sydney"
                    status: "completed"
                    source: "ifsc"
                    season_id: 999184339
                    external_id: 1523
                    results_synced_at: "2026-03-02T04:15:00.000Z"
                  - id: 1056528741
                    name: "IFSC World Cup Wujiang 2025"
                    location: "Wujiang, CHN"
                    country_code: "CHN"
                    starts_on: "2025-04-25"
                    ends_on: "2025-04-27"
                    starts_at: "2025-04-24T16:00:00.000Z"
                    ends_at: "2025-04-27T15:59:00.000Z"
                    timezone_name: "Asia/Shanghai"
                    status: "completed"
                    source: "ifsc"
                    season_id: 579274347
                    external_id: 1406
                    results_synced_at: "2025-10-05T09:30:00.000Z"
                meta:
                  page: 1
                  per_page: 25
                  total: 4

  /api/v1/events/{id}:
    get:
      summary: Get event detail with categories
      tags:
        - Events
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: "#/components/schemas/Event"
                      - type: object
                        properties:
                          season:
                            $ref: "#/components/schemas/Season"
                          categories:
                            type: array
                            items:
                              $ref: "#/components/schemas/Category"
                required:
                  - data
              example:
                data:
                  id: 1056528741
                  name: "IFSC World Cup Wujiang 2025"
                  location: "Wujiang, CHN"
                  country_code: "CHN"
                  starts_on: "2025-04-25"
                  ends_on: "2025-04-27"
                  starts_at: "2025-04-24T16:00:00.000Z"
                  ends_at: "2025-04-27T15:59:00.000Z"
                  timezone_name: "Asia/Shanghai"
                  status: "completed"
                  source: "ifsc"
                  season_id: 579274347
                  external_id: 1406
                  results_synced_at: "2025-10-05T09:30:00.000Z"
                  season:
                    id: 579274347
                    name: "IFSC World Cup 2025"
                    year: 2025
                    source: "ifsc"
                    external_id: 37
                  categories:
                    - id: 331850261
                      name: "LEAD Men"
                      discipline: "lead"
                      gender: "male"
                      category_status: "finished"
                      external_dcat_id: 1
                    - id: 767885520
                      name: "LEAD Women"
                      discipline: "lead"
                      gender: "female"
                      category_status: "finished"
                      external_dcat_id: 5
                    - id: 622874940
                      name: "SPEED Men"
                      discipline: "speed"
                      gender: "male"
                      category_status: "finished"
                      external_dcat_id: 2
                    - id: 639244710
                      name: "SPEED Women"
                      discipline: "speed"
                      gender: "female"
                      category_status: "finished"
                      external_dcat_id: 6
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Not found"

  /api/v1/categories/{id}:
    get:
      summary: Get category detail with rounds
      tags:
        - Categories
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: "#/components/schemas/Category"
                      - type: object
                        properties:
                          rounds:
                            type: array
                            items:
                              $ref: "#/components/schemas/Round"
                required:
                  - data
              example:
                data:
                  id: 430410076
                  name: "BOULDER Men"
                  discipline: "boulder"
                  gender: "male"
                  category_status: "finished"
                  external_dcat_id: 3
                  rounds:
                    - id: 801082457
                      name: "Qualification"
                      round_type: "qualification"
                      status: "completed"
                      format: "IFSC: 2 groups 2025 (points)"
                      external_round_id: 9381
                    - id: 89087024
                      name: "Semi-final"
                      round_type: "semi_final"
                      status: "completed"
                      format: "IFSC: 1 group 2025 (points)"
                      external_round_id: 9953
                    - id: 572265335
                      name: "Final"
                      round_type: "final"
                      status: "completed"
                      format: "IFSC: finals 2025 (points)"
                      external_round_id: 9955
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Not found"

