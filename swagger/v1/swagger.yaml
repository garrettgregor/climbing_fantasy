  /api/v1/athletes:
    get:
      summary: List athletes
      tags:
        - Athletes
      parameters:
        - name: q
          in: query
          required: false
          description: Search by name (case-insensitive)
          schema:
            type: string
        - name: country
          in: query
          required: false
          description: Filter by country code
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Athletes listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Athlete"
                  meta:
